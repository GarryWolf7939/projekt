<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
    <title>UnderHood AR - Ghost Mechanic</title>

    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <link rel="stylesheet" href="css/style.css?v=4.0" />
  </head>

  <body>

    <!-- SPLASH -->
    <div id="splash-screen">
      <h1 id="splash-title">Ghost Mechanic App</h1>
      <button id="start-btn">Start</button>
    </div>

    <!-- TOP UI -->
    <button id="flashlight-btn" title="Latarka">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 6c0 2-2 2-2 4v10a2 2 0 0 1-2 2h-4a2 2 0 0 1-2-2V10c0-2-2-2-2-4V2h12z"></path>
      </svg>
    </button>

    <button id="assist-mode-btn" title="Asysta">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"></circle>
        <circle cx="12" cy="12" r="4"></circle>
      </svg>
    </button>

    <!-- AR -->
    <a-scene
      mindar-image="imageTargetSrc: assets/oslona.mind;"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
    >
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="engine-anchor" mindar-image-target="targetIndex: 0"></a-entity>
    </a-scene>

    <!-- OVERLAYS -->
    <div id="assist-overlay"></div>
    <div id="center-dot"></div>

    <!-- UI -->
    <div id="ui-container">
      <div id="marker-buttons-container"></div>

      <div id="info-panel" class="hidden">
        <div class="panel-header">
          <div class="drag-pill"></div>
          <h2 id="info-title"></h2>
        </div>
        <div class="panel-content">
          <p id="info-desc"></p>
          <button id="close-btn">OK</button>
        </div>
      </div>
    </div>

    <div id="markers-on-screen"></div>

    <script src="js/app.js?v=4.0"></script>
  </body>
</html>
