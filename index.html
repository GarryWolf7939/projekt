<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>UnderHood AR - Ghost Mechanic</title>

    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <link rel="stylesheet" href="css/style.css?v=2.2" />
  </head>
  <body>
    <div id="ui-container">

      <button id="flashlight-btn" title="Włącz/Wyłącz latarkę">
        ...
      </button>

      <div id="marker-buttons-container"></div>

      <div id="info-panel" class="hidden">
        <div class="panel-header">
          <div class="drag-pill"></div>
          <h2 id="info-title">Nazwa elementu</h2>
        </div>
        <div class="panel-content">
          <p id="info-desc">
            Szczegółowy opis elementu pojawi się tutaj...
          </p>
          <button id="close-btn">Zrozumiałem</button>
        </div>
      </div>
    </div>

    <div id="debug-log"></div>

    <a-scene
      mindar-image="imageTargetSrc: assets/oslona.mind;"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-light
        type="ambient"
        intensity="1"
      ></a-light>

      <a-light
        type="directional"
        intensity="1"
        position="1 1 1"
      ></a-light>

      <a-camera
        position="0 0 0"
        look-controls="enabled: false"
      ></a-camera>

      <a-entity
        id="engine-anchor"
        mindar-image-target="targetIndex: 0"
      ></a-entity>
    </a-scene>

    <script src="https://unpkg.com/vconsole@latest/dist/vconsole.min.js"></script>

    <script>
      new VConsole();
      console.log("vConsole started");
    </script>

    <script src="js/app.js?v=2.2"></script>
  </body>
</html>
