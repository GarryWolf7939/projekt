<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>UnderHood AR - Ghost Mechanic</title>

    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <link rel="stylesheet" href="css/style.css" />
    
    <!-- vConsole do debugowania na telefonie -->
    <script src="https://unpkg.com/vconsole@latest/dist/vconsole.min.js"></script>
  </head>
  <body>
    <div id="ui-container">
      <button id="flashlight-btn" title="Włącz/Wyłącz latarkę">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path
            d="M18 6c0 2-2 2-2 4v10a2 2 0 0 1-2 2h-4a2 2 0 0 1-2-2V10c0-2-2-2-2-4V2h12z"
          ></path>
          <line x1="6" y1="6" x2="18" y2="6"></line>
          <line x1="12" y1="12" x2="12" y2="12"></line>
        </svg>
      </button>

      <div id="info-panel" class="hidden">
        <div class="panel-header">
          <div class="drag-pill"></div>
          <h2 id="info-title">Nazwa elementu</h2>
        </div>
        <div class="panel-content">
          <p id="info-desc">Szczegółowy opis elementu pojawi się tutaj...</p>
          <button id="close-btn">Zrozumiałem</button>
        </div>
      </div>
    </div>

    <a-scene
      mindar-image="imageTargetSrc: assets/oslona.mind; autoStart: true; uiLoading: yes; uiScanning: yes;"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="engine-anchor" mindar-image-target="targetIndex: 0">
      </a-entity>
    </a-scene>

    <script src="js/app.js"></script>
    
    <!-- Uruchom vConsole -->
    <script>
      var vConsole = new VConsole();
      console.log("✅ vConsole działa! Szukaj zielonego przycisku na ekranie");
      console.log("📱 UnderHood AR - wersja z debugowaniem");
    </script>
  </body>
</html>
