<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UnderHood AR - Ghost Mechanic</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <link rel="stylesheet" href="css/style.css">
</head>
<body style="margin: 0; overflow: hidden;">

    <a-scene 
        mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.2/examples/image-tracking/assets/card-example/card.mind;" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            
            <a-box position="0 0 0.1" scale="0.3 0.3 0.3" color="red" animation="property: rotation; to: 0 360 0; loop: true; dur: 3000"></a-box>
            
        </a-entity>
    </a-scene>

    <script src="js/app.js"></script>
</body>
</html>
