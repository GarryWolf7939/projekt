<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
    <title>UnderHood AR - Ghost Mechanic</title>

    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <link rel="stylesheet" href="css/style.css?v=3.0" />
  </head>

  <body>

    <!-- TOP BUTTONS -->
    <button id="flashlight-btn" title="Latarka">🔦</button>

    <button id="assist-mode-btn" title="Tryb asysty">
      🎯
    </button>

    <!-- AR SCENE -->
    <a-scene
      mindar-image="imageTargetSrc: assets/oslona.mind;"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="engine-anchor" mindar-image-target="targetIndex: 0"></a-entity>
    </a-scene>

    <!-- OVERLAY ASYSTY -->
    <div id="assist-overlay"></div>
    <div id="center-dot"></div>

    <!-- UI -->
    <div id="ui-container">
      <div id="marker-buttons-container"></div>

      <div id="info-panel" class="hidden">
        <div class="panel-header">
          <div class="drag-pill"></div>
          <h2 id="info-title"></h2>
        </div>

        <div class="panel-content">
          <p id="info-desc"></p>
          <button id="close-btn">OK</button>
        </div>
      </div>
    </div>

    <!-- screen markers -->
    <div id="markers-on-screen"></div>

    <script src="js/app.js?v=3.0"></script>
  </body>
</html>
