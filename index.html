<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>UnderHood AR - Ghost Mechanic</title>

    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div id="ui-container">
      <div id="info-panel" class="hidden">
        <div class="panel-header">
          <div class="drag-pill"></div>
          <h2 id="info-title">Nazwa elementu</h2>
        </div>
        <div class="panel-content">
          <p id="info-desc">Szczegółowy opis elementu pojawi się tutaj...</p>
          <button id="close-btn">Zrozumiałem</button>
        </div>
      </div>
    </div>

    <a-scene
      mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.2/examples/image-tracking/assets/card-example/card.mind; filterMinCF: 0.1; filterBeta: 10;"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-camera
        position="0 0 0"
        look-controls="enabled: false"
        cursor="fuse: false; rayOrigin: mouse;"
        raycaster="objects: .clickable"
      ></a-camera>

      <a-entity id="engine-anchor" mindar-image-target="targetIndex: 0">
      </a-entity>
    </a-scene>

    <script src="js/app.js"></script>
  </body>
</html>
